<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
    <title>Agent Lite PWA</title>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Agent Lite</h1>
        <span id="connection-pill" class="pill">offline</span>
      </header>

      <section id="chat-log" class="chat-log" aria-live="polite"></section>

      <form id="composer" class="composer">
        <input id="message-input" type="text" maxlength="500" placeholder="Type a message..." required />
        <button type="submit">Send</button>
      </form>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
